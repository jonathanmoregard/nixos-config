# .github/workflows/gate.yml
#
# Trusted merge-gate workflow. Runs on `pull_request_target` so it
# executes the BASE branch's workflow + script, not the PR's.
#
# Single job (label-gate) that asserts the small set of label
# invariants this repo cares about — currently just the
# `baseline:approved` requirement when `tests/baselines/` is touched.
# The risk-classifier system was removed (was higher overhead than
# value for a solo-author repo); historical risk:* labels on closed
# PRs are kept untouched.
#
# Permissions: pull-requests:write + issues:write are kept here
# (rather than ci.yml) so the trust boundary stays — only this
# workflow can write labels / comments under the GH token.
#
# Fork policy: this repo does NOT accept external contributions. The
# job is gated on `head.repo == base.repo`. Fork PRs cause it to
# skip — close-fork-prs.yml handles drive-by PR auto-close.
name: gate

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label-gate:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Validate every current label against add-time allowlist
        env:
          REPO: ${{ github.repository }}
        run: |
          # Walk the PR's timeline to find each label's actor; refuse
          # if any current label was added by a disallowed actor.
          # Runs on EVERY workflow invocation
          # (open/sync/labeled/unlabeled) so a pre-existing label
          # added between events is still audited.
          set -euo pipefail
          labels=$(gh pr view "${PR_NUMBER}" --json labels --jq '.labels[].name')
          while IFS= read -r label_name; do
            [ -z "$label_name" ] && continue
            actor=$(gh api --paginate "repos/${REPO}/issues/${PR_NUMBER}/timeline" \
              --jq "[.[] | select(.event == \"labeled\" and .label.name == \"$label_name\")] | last | .actor.login")
            case "$label_name" in
              baseline:approved)
                if [ "$actor" != "jonathan" ]; then
                  echo "❌ label '$label_name' added by disallowed actor: $actor"
                  exit 1
                fi
                ;;
            esac
          done <<< "$labels"

      - name: Compute label-gate status
        run: |
          set -euo pipefail
          labels=$(gh pr view "${PR_NUMBER}" --json labels --jq '[.labels[].name]')
          has() { echo "$labels" | jq -e --arg l "$1" 'index($l) != null' >/dev/null; }

          # label-gate fails ONLY on real errors:
          # - label added by disallowed actor (handled in earlier step)
          # - tests/baselines/ touched without baseline:approved label
          #
          # Merge gating: required status checks (build/vm-minimal/etc.)
          # are the gate. No required review on this solo-author repo.
          # All `gh pr merge` invocations are denied at the safe-bash
          # MCP layer so merges happen via the GitHub UI's merge button.
          touched_baseline=$(gh pr view "${PR_NUMBER}" --json files \
            --jq '[.files[].path | select(startswith("tests/baselines/"))] | length')
          if [ "$touched_baseline" -gt 0 ]; then
            if ! has "baseline:approved"; then
              echo "❌ tests/baselines/ changed but baseline:approved label missing"
              exit 1
            fi
          fi

          echo "✓ label-gate passes"
