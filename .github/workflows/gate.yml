# .github/workflows/gate.yml
#
# Trusted merge-gate workflow. Runs on `pull_request_target` so it executes
# the BASE branch's workflow + script, not the PR's. PR diff is fetched
# explicitly and treated as untrusted data.
#
# Steps:
#   classify  → posts risk label (risk:critical/high/medium/low/trivial)
#   ai-review → only if MEDIUM; subagent reviews diff, may add ai-approved
#   label-gate → status check that encodes merge-gating logic, consumed
#                by the GitHub Ruleset on `main`
#
# Permissions: pull-requests:write + issues:write are required for the
# label-add step. The PR-branch ci.yml workflow does NOT have these.
name: gate

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  classify:
    runs-on: [self-hosted, x86_64-linux]
    # Skip fork PRs: classify-pr.sh runs `nix build` against the PR sha,
    # and Nix flake evaluation is unsandboxed → arbitrary code execution
    # on the self-hosted runner. close-fork-prs.yml handles drive-by PRs
    # via metadata-only auto-close. Same-repo PRs only.
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.action != 'labeled' && github.event.action != 'unlabeled'
    outputs:
      risk: ${{ steps.classify.outputs.risk }}
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Check out base branch (trusted code path)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Fetch PR head
        run: |
          git fetch origin "+refs/pull/${PR_NUMBER}/head:refs/remotes/pr/head"

      - name: Run classifier (script loaded from base checkout)
        id: classify
        run: |
          set -euo pipefail
          # Classifier script is loaded from base — PR-modified versions
          # are NOT executed.
          ./scripts/classify-pr.sh > /tmp/classify-output.md
          cat /tmp/classify-output.md

      - name: Apply risk label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          risk_lower=$(echo "${{ steps.classify.outputs.risk }}" | tr '[:upper:]' '[:lower:]')

          # Ensure all risk:* labels exist in the repo (idempotent;
          # gh label create --force overwrites color/desc, doesn't error
          # on existing).
          gh label create risk:critical --color B60205 --description "Classifier: CRITICAL" --force
          gh label create risk:high     --color D93F0B --description "Classifier: HIGH"     --force
          gh label create risk:medium   --color FBCA04 --description "Classifier: MEDIUM"   --force
          gh label create risk:low      --color 0E8A16 --description "Classifier: LOW"      --force
          gh label create risk:trivial  --color 1D76DB --description "Classifier: TRIVIAL"  --force
          gh label create ai-approved   --color 5319E7 --description "AI reviewer approved" --force
          gh label create baseline:approved --color 5319E7 --description "Pixel baseline drift approved" --force

          # Strip any existing risk:* label, add the new one. Removes
          # one at a time so a missing label doesn't abort the rest.
          for old in risk:critical risk:high risk:medium risk:low risk:trivial; do
            gh pr edit "${PR_NUMBER}" --remove-label "$old" 2>/dev/null || true
          done
          gh pr edit "${PR_NUMBER}" --add-label "risk:${risk_lower}"

      - name: Post classifier breakdown as PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${PR_NUMBER}" --body-file /tmp/classify-output.md

  label-gate:
    runs-on: [self-hosted, x86_64-linux]
    # Always runs (including label change events). Fork-PR guard: skip
    # entirely so a fork PR can't even add labels via this workflow.
    if: github.event.pull_request.head.repo.full_name == github.repository
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Validate every current label against add-time allowlist
        env:
          REPO: ${{ github.repository }}
        run: |
          # Walk the PR's timeline to find each label's actor; refuse if
          # any current label was added by a disallowed actor. Runs on
          # EVERY workflow invocation (open/sync/labeled/unlabeled) so a
          # pre-existing label added between events is still audited.
          set -euo pipefail
          labels=$(gh pr view "${PR_NUMBER}" --json labels --jq '.labels[].name')
          while IFS= read -r label_name; do
            [ -z "$label_name" ] && continue
            actor=$(gh api --paginate "repos/${REPO}/issues/${PR_NUMBER}/timeline" \
              --jq "[.[] | select(.event == \"labeled\" and .label.name == \"$label_name\")] | last | .actor.login")
            case "$label_name" in
              risk:*)
                if [ "$actor" != "github-actions[bot]" ]; then
                  echo "❌ label '$label_name' added by disallowed actor: $actor"
                  exit 1
                fi
                ;;
              baseline:approved)
                if [ "$actor" != "jonathan" ]; then
                  echo "❌ label '$label_name' added by disallowed actor: $actor"
                  exit 1
                fi
                ;;
            esac
          done <<< "$labels"

      - name: Compute label-gate status
        run: |
          set -euo pipefail
          labels=$(gh pr view "${PR_NUMBER}" --json labels --jq '[.labels[].name]')
          has() { echo "$labels" | jq -e --arg l "$1" 'index($l) != null' >/dev/null; }

          # label-gate fails ONLY on real errors:
          # - label added by disallowed actor (handled in earlier step)
          # - tests/baselines/ touched without baseline:approved label
          #
          # Risk-based merge gating moved to branch protection:
          # required_approving_review_count=1 blocks merge until a fresh
          # APPROVED review lands. enforce_admins=false lets the admin
          # bypass via the UI's "Merge without waiting" button. Solo-author
          # case (PR author == reviewer) is handled by admin override,
          # not by failing this check. gh pr merge --admin is denied at
          # the safe-bash MCP layer to keep override a deliberate UI act.
          touched_baseline=$(gh pr view "${PR_NUMBER}" --json files \
            --jq '[.files[].path | select(startswith("tests/baselines/"))] | length')
          if [ "$touched_baseline" -gt 0 ]; then
            if ! has "baseline:approved"; then
              echo "❌ tests/baselines/ changed but baseline:approved label missing"
              exit 1
            fi
          fi

          echo "✓ label-gate passes"
