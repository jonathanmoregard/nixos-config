# .github/workflows/update-beeper.yml
#
# Daily check for a newer Beeper release. Runs `nix run .#update-beeper`
# (defined in overlays/beeper.nix), which follows api.beeper.com's "stable"
# redirect, prefetches the AppImage, and rewrites version + hash in
# overlays/beeper.nix in-place. If the bumper produced a diff, push it to
# `bot/update-beeper` and open (or update) a PR.
#
# Why not peter-evans/create-pull-request: avoids pinning a third-party
# action when `gh` covers the same surface and the existing workflows
# already trust `gh` (pre-installed on GitHub-hosted runners).
#
# Trigger downstream CI: PRs opened via the workflow-default GITHUB_TOKEN
# do NOT fire `pull_request` events on the initial open (security feature
# against recursive workflow loops). We work around it by close+reopen —
# `reopened` IS one of the event types that ci.yml subscribes to. Closing
# first prevents stale CI from running on intermediate states.
name: update-beeper

on:
  schedule:
    # 06:17 UTC daily. Off-the-hour to avoid the cron stampede on :00.
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-beeper
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Need real history so a force-push to bot/update-beeper resets
          # cleanly rather than tracking back to a shallow root.
          fetch-depth: 0

      - uses: DeterminateSystems/determinate-nix-action@7c4cc317e802185875512bfcb68259257279d767 # v3

      - name: Bump beeper if upstream advanced
        run: nix run .#update-beeper

      - name: Detect diff
        id: diff
        run: |
          if git diff --quiet -- overlays/beeper.nix; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "update-beeper: no diff, already on latest upstream"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff -- overlays/beeper.nix
            new_version=$(grep --only-matching --perl-regexp '(?<=version = ")[0-9.]+' overlays/beeper.nix | head -1)
            echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch and open or refresh PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.diff.outputs.new_version }}
        run: |
          set -euo pipefail
          branch=bot/update-beeper

          git config user.name 'beeper-update-bot[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          # Branch off main, force-push so retries overwrite stale state.
          git checkout -B "$branch"
          git add overlays/beeper.nix
          git commit -m "overlays(beeper): bump to ${NEW_VERSION}"
          git push --force origin "$branch"

          pr_number=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number' || true)
          if [ -z "$pr_number" ]; then
            gh pr create \
              --head "$branch" \
              --base main \
              --title "overlays(beeper): bump to ${NEW_VERSION}" \
              --body "Automated bump generated by \`.github/workflows/update-beeper.yml\`. Source: \`nix run .#update-beeper\` followed Beeper's stable redirect and rewrote \`overlays/beeper.nix\`."
            pr_number=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')
          fi

          # close+reopen to fire pull_request events on a workflow-token PR.
          gh pr close "$pr_number" --comment 'closing to refresh CI triggers'
          gh pr reopen "$pr_number"
